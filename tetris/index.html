<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Tetris - Portfólio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tela de Login Inicial -->
    <div id="login-screen" class="modal-overlay">
        <div class="modal-box">
            <h2>🧱 Retro Tetris Arcade</h2>
            <p>Empilhe os blocos, complete linhas e conquiste o topo do placar. Insira seu nome de jogador:</p>
            <input type="text" id="username-input" placeholder="Seu Nickname..." maxlength="12">
            <button id="start-game-btn">Inserir Ficha & Jogar</button>
        </div>
    </div>

    <!-- Container Principal do Jogo -->
    <div class="game-container hidden" id="main-game-container">
        <header>
            <h1>🧱 TETRIS</h1>
            <div class="scoreboard">
                <div>Jogador: <span id="player-name-display">---</span></div>
                <div>Pontos: <span id="score-display">0</span></div>
                <div>Linhas: <span id="lines-display">0</span></div>
            </div>
        </header>

        <!-- Área Central: Jogo + Ranking -->
        <div class="arcade-layout">
            <div class="canvas-area">
                <canvas id="tetris-canvas" width="240" height="480"></canvas>
            </div>

            <!-- Painel de Controles Touch Interativos (Mobile) -->
            <div class="mobile-controls">
                <button class="ctrl-btn btn-left" id="ctrl-left">◀</button>
                <button class="ctrl-btn btn-rotate" id="ctrl-rotate">🔄</button>
                <button class="ctrl-btn btn-right" id="ctrl-right">▶</button>
                <button class="ctrl-btn btn-down" id="ctrl-down">▼</button>
            </div>

            <!-- Placar de Líderes -->
            <section class="ranking-container">
                <h3>🏆 TOP 5 RECORDES</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Nome</th>
                            <th>Pontos</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body">
                        <!-- Inserido dinamicamente -->
                    </tbody>
                </table>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
