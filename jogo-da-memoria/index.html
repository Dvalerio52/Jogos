<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notícias em Mente - Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tela de Login Inicial -->
    <div id="login-screen" class="modal-overlay">
        <div class="modal-box">
            <h2>🧠 Notícias em Mente</h2>
            <p>Prepare-se para o desafio de atualidades! Insira seu nome de jogador para iniciar a campanha:</p>
            <input type="text" id="username-input" placeholder="Digite seu Nome ou Nick..." maxlength="15">
            <button id="start-campaign-btn">Iniciar Jogo</button>
        </div>
    </div>

    <div class="game-container hidden" id="main-game-container">
        <header>
            <h1>🧠 Notícias em Mente</h1>
            <div class="status-panel">
                <span id="player-display">Jogador: </span>
                <span id="moves-counter">Movimentos: 0</span>
                <span id="current-phase">Fase: 1/3</span>
            </div>
        </header>

        <!-- Tabuleiro -->
        <main class="game-grid" id="game-grid"></main>

        <!-- Ranking -->
        <section class="ranking-container">
            <h2>🏆 Hall da Fama Arcade (Menos Movimentos)</h2>
            <table id="ranking-table">
                <thead>
                    <tr>
                        <th>Posição</th>
                        <th>Nome</th>
                        <th>Pontuação Total</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="ranking-body">
                    <!-- Gerado dinamicamente -->
                </tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
