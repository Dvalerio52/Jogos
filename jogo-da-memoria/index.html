<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade de Atualidades: Jogo da Memória</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Notícias em Mente 🧠</h1>
        <p>Combine as manchetes/imagens das atualidades recentes!</p>
        <div class="score-board">
            <span>Tentativas: <strong id="attempts">0</strong></span>
            <span>Acertos: <strong id="matches">0</strong></span>
        </div>
        <button id="reset-btn">Reiniciar Jogo</button>
    </header>

    <main class="game-container">
        <div class="game-grid" id="game-grid"></div>
    </main>

   <script src="script.js"></script>
</body>
</html>
